<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA | MODERATOR COMMAND</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="hero">
        <div class="hero-art" aria-hidden="true">
            <svg viewBox="0 0 800 240" class="hero-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff8456"/>
                        <stop offset="55%" stop-color="#df2d52"/>
                        <stop offset="100%" stop-color="#651a33"/>
                    </linearGradient>
                    <linearGradient id="signal" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#8af5b2" stop-opacity="0.1"/>
                        <stop offset="50%" stop-color="#8af5b2" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#8af5b2" stop-opacity="0.1"/>
                    </linearGradient>
                </defs>
                <rect width="800" height="240" rx="28" fill="#120d14"/>
                <circle cx="118" cy="112" r="78" fill="url(#ember)" opacity="0.95"/>
                <circle cx="682" cy="76" r="44" fill="#1d6b57" opacity="0.45"/>
                <path d="M0 181 C123 142, 179 220, 296 181 S509 135, 642 176 S760 205, 800 159" stroke="url(#signal)" stroke-width="6" fill="none"/>
                <path d="M146 92 C172 56, 235 53, 263 92" stroke="#fff5e8" stroke-width="8" fill="none" stroke-linecap="round"/>
                <circle cx="188" cy="104" r="7" fill="#fff5e8"/>
                <circle cx="225" cy="104" r="7" fill="#fff5e8"/>
                <path d="M179 136 C196 147, 216 147, 234 136" stroke="#fff5e8" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M478 66 l34 0 l19 33 l-19 33 l-34 0 l-18 -33 z" fill="#182f2a" stroke="#8af5b2" stroke-width="4"/>
                <path d="M542 66 l34 0 l19 33 l-19 33 l-34 0 l-18 -33 z" fill="#2f1921" stroke="#ff8456" stroke-width="4"/>
                <text x="84" y="205" fill="#f6f0eb" font-size="52" font-family="Georgia, serif">Moderator Command</text>
                <text x="86" y="228" fill="#9ab7ad" font-size="18" font-family="monospace">FREE-WILi live state, voice path, and roster pressure at a glance</text>
            </svg>
        </div>
        <h1>MAFIA COMMAND <span id="phase-badge" class="phase-tag">LOBBY</span></h1>
    </header>

    <main class="grid">
        <!-- Left Column: Game Logs -->
        <section class="panel">
            <h2>Activity Log</h2>
            <div id="logs">
                <div class="log-entry">Waiting for game start...</div>
            </div>
        </section>

        <!-- Right Column: Player Roster & State -->
        <aside>
            <section class="panel">
                <h2>Players</h2>
                <div id="players" class="player-list">
                    <!-- Players injected here -->
                </div>
            </section>

            <section class="panel status-viz" style="margin-top: 20px;">
                <h2>System State</h2>
                <div id="stats-container">
                    <pre id="state-raw">Initialized...</pre>
                </div>
            </section>
        </aside>
    </main>

    <script>
        let lastLogCount = 0;

        async function updateDashboard() {
            try {
                const [stateRes, logsRes] = await Promise.all([
                    fetch('/api/state'),
                    fetch('/api/logs')
                ]);

                const state = await stateRes.json();
                const logs = await logsRes.json();

                // Update Phase Header
                const phaseBadge = document.getElementById('phase-badge');
                phaseBadge.innerText = state.phase.toUpperCase() + (state.turn > 0 ? ` (DAY ${state.turn})` : '');
                
                // Update Player List
                const playersDiv = document.getElementById('players');
                playersDiv.innerHTML = state.players.map(p => `
                    <div class="player ${p.alive ? '' : 'dead'}">
                        <div class="player-name">
                            ${renderAvatar(p)}
                            ${p.name}
                        </div>
                        <div class="player-role">${p.role}</div>
                    </div>
                `).join('');

                // Update Raw State
                document.getElementById('state-raw').innerText = JSON.stringify(state.votes || {}, null, 2);

                // Update Logs
                if (logs.length !== lastLogCount) {
                    const logsDiv = document.getElementById('logs');
                    logsDiv.innerHTML = logs.reverse().map(l => `
                        <div class="log-entry ${l.public ? 'log-public' : 'log-private'}">
                            <span class="log-phase">${l.phase.toUpperCase()}</span>
                            ${l.message}
                        </div>
                    `).join('');
                    lastLogCount = logs.length;
                    
                    // Simple auto-scroll to top (since we reversed records for 'latest first' feel)
                    logsDiv.scrollTop = 0;
                }

            } catch (err) {
                console.error("Dashboard Sync Error:", err);
            }
        }

        function renderAvatar(player) {
            const fill = player.alive ? (player.is_ai ? '#8af5b2' : '#ffd08a') : '#5c4c56';
            const ring = player.alive ? '#f7f0ea' : '#3a3239';
            const glyph = player.is_ai ? `
                <rect x="11" y="10" width="26" height="18" rx="6" fill="${fill}" />
                <circle cx="19" cy="19" r="2.5" fill="#101014" />
                <circle cx="29" cy="19" r="2.5" fill="#101014" />
                <path d="M18 25h12" stroke="#101014" stroke-width="2.6" stroke-linecap="round"/>
                <path d="M24 7v4" stroke="${fill}" stroke-width="3" stroke-linecap="round"/>
            ` : `
                <circle cx="24" cy="16" r="7" fill="${fill}" />
                <path d="M12 38c1-8 8-12 12-12s11 4 12 12" fill="${fill}" />
            `;

            return `
                <span class="avatar avatar-svg" aria-hidden="true">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="20" fill="none" stroke="${ring}" stroke-width="2"/>
                        ${glyph}
                    </svg>
                </span>
            `;
        }

        // Poll every 1.5 seconds for hardware responsiveness
        setInterval(updateDashboard, 1500);
        updateDashboard();
    </script>
</body>
</html>
